name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # v3.9.2, v4.0.0, ...

permissions:
  contents: write

jobs:
  release:
    name: Build and publish the release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      # The version in the code must match the tag. A release that ships a tool announcing a
      # different version than the one you downloaded is a support incident waiting to happen —
      # and the versions in this repo HAD drifted (code said 3.0.0, README said 3.8, the changelog
      # said 3.9.1, and no 3.9 tag existed at all).
      - name: Version matches the tag
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          CODE_VERSION="$(grep -m1 '^VERSION=' scripts/migrate_keycloak_v3.sh | cut -d'"' -f2)"

          if [ "$CODE_VERSION" != "$VERSION" ]; then
            echo "::error::Tag is v$VERSION but scripts/migrate_keycloak_v3.sh says VERSION=\"$CODE_VERSION\""
            echo "Update VERSION in the script, or tag the version the code actually is."
            exit 1
          fi
          echo "OK: code and tag both say $VERSION"

      # The old extraction was `awk "/## \[$V\]/,/## \[/" | sed '$d'`. An awk range whose START line
      # also matches its END pattern collapses to that one line — and `sed '$d'` then deleted it.
      # Release notes came out EMPTY. It was never noticed because the release had not been run
      # since the changelog started carrying real content.
      - name: Extract the changelog entry for this version
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"

          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { found = 1; next }   # skip the header itself
            found && /^## \[/      { exit }              # stop at the next version
            found                  { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "::error::CHANGELOG.md has no '## [$VERSION]' section — write the release notes first."
            exit 1
          fi

          echo "--- release notes ---"
          cat release_notes.md

      # The archive contains what the RECIPIENT needs to perform a migration, and nothing else.
      #
      # Deliberately NOT shipped: tests/ (they verify the tool, they do not migrate anything),
      # README.md (1300 lines of feature catalogue — QUICKSTART is the instruction), CHANGELOG,
      # ARCHITECTURE, CONTRIBUTING, SECURITY. Those are for people working ON the tool, in the repo.
      # The old list managed to ship stale V3_*.md status dumps while omitting the only real runbook.
      - name: Build the release archive
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          DIR="release/keycloak-migration-$VERSION"

          mkdir -p "$DIR/docs" "$DIR/config"

          # The tool itself
          cp -r scripts/        "$DIR/"     # migrate_oneshot, migrate_keycloak_v3, libs, harness
          cp -r profiles/       "$DIR/"     # ready-made configurations, and examples to copy
          cp -r containerfiles/ "$DIR/"     # recipes: build the images from YOUR licensed base

          # Superseded entrypoints from before the container-hop model. Nothing references them and
          # they would only invite someone to run the wrong tool.
          rm -f "$DIR/scripts/migrate_keycloak.sh" \
                "$DIR/scripts/migrate_keycloak.sh.v1.backup" \
                "$DIR/scripts/migrate_keycloak_v2.sh" \
                "$DIR/scripts/IMPROVEMENTS_APPLIED.md"

          # Examples to fill in
          cp config/images.conf.example       "$DIR/config/"
          cp config/kc-migration.env.example  "$DIR/config/"

          # The instructions
          cp QUICKSTART.md            "$DIR/"        # start here
          cp docs/MIGRATION_GUIDE.md  "$DIR/docs/"   # the full runbook
          cp docs/AIRGAP.md           "$DIR/docs/"   # offline / sovereign delivery
          cp LICENSE                  "$DIR/"

          # An archive whose scripts do not parse is not a release.
          find "$DIR/scripts" -name '*.sh' -type f -print0 | xargs -0 -n1 bash -n

          echo "--- shipping ---"
          ( cd "$DIR" && find . -maxdepth 2 | sort )

          tar czf "release/keycloak-migration-$VERSION.tar.gz" -C release "keycloak-migration-$VERSION"
          ( cd release && sha256sum "keycloak-migration-$VERSION.tar.gz" \
              > "keycloak-migration-$VERSION.tar.gz.sha256" )

          ls -lh release/

      # actions/create-release and actions/upload-release-asset were ARCHIVED by GitHub in 2021 and
      # receive no fixes. softprops/action-gh-release does both jobs in one step.
      - name: Publish the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            release/keycloak-migration-${{ steps.version.outputs.version }}.tar.gz
            release/keycloak-migration-${{ steps.version.outputs.version }}.tar.gz.sha256

      # NOTE: the per-hop container images are NOT here. They are 1.5-1.8 GiB each, built FROM
      # licensed Astra/RED OS bases that may not be redistributed (ADR-006), and are published
      # separately by .github/workflows/build-images.yml to a PRIVATE registry. See docs/AIRGAP.md.
